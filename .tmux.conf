# nmux tmux configuration
# macOS / Ubuntu cross-platform
# https://github.com/naotantan/nmux

set -g mouse on

# ── クリップボード（OS 自動判定）─────────────────────────────
# macOS
if-shell "command -v pbcopy >/dev/null 2>&1" {
  bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'
  bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'
  bind -T copy-mode-vi y                 send-keys -X copy-pipe-and-cancel 'pbcopy'
}

# Linux Wayland
if-shell "command -v wl-copy >/dev/null 2>&1" {
  bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy'
  bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy'
  bind -T copy-mode-vi y                 send-keys -X copy-pipe-and-cancel 'wl-copy'
}

# Linux X11 (xclip)
if-shell "command -v xclip >/dev/null 2>&1 && ! command -v wl-copy >/dev/null 2>&1" {
  bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'
  bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'
  bind -T copy-mode-vi y                 send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'
}

# Linux X11 フォールバック (xsel)
if-shell "command -v xsel >/dev/null 2>&1 && ! command -v xclip >/dev/null 2>&1 && ! command -v wl-copy >/dev/null 2>&1" {
  bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xsel --clipboard --input'
  bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xsel --clipboard --input'
  bind -T copy-mode-vi y                 send-keys -X copy-pipe-and-cancel 'xsel --clipboard --input'
}

# ── スクロール: ホイールでコピーモード自動移行 ──────────────
bind -n WheelUpPane \
  if-shell -F -t = '#{mouse_any_flag}' \
    'send-keys -M' \
    'if -Ft= "#{pane_in_mode}" "send-keys -M" "copy-mode -e"'

# ── ペインナビゲーション（Option/Alt+ijkl、ラップなし）──────
bind -n M-j if -F '#{pane_at_left}'   '' 'select-pane -L'
bind -n M-l if -F '#{pane_at_right}'  '' 'select-pane -R'
bind -n M-i if -F '#{pane_at_top}'    '' 'select-pane -U'
bind -n M-k if -F '#{pane_at_bottom}' '' 'select-pane -D'

# ── ペイン操作 ──────────────────────────────────────────────
bind -n M-n split-window -h \; select-layout tiled
bind -n M-w kill-pane
bind -n M-o next-layout
bind -n M-g select-pane -m
bind -n M-y run-shell 'tmux swap-pane -s "{marked}" && tmux select-pane -M'

# ── ウィンドウナビゲーション ────────────────────────────────
bind -n M-u if -F '#{window_end_flag}'   '' 'next-window'
bind -n M-h if -F '#{window_start_flag}' '' 'previous-window'
bind -n M-m new-window

# ── スクロールモード（copy-mode / copy-mode-vi 両対応）──────
bind -n M-Tab if -F '#{pane_in_mode}' 'send-keys -X cancel' 'copy-mode'

# copy-mode (emacs) — i/k との競合を避け U/D に統一
bind -T copy-mode   U      send-keys -X -N 2 scroll-up
bind -T copy-mode   D      send-keys -X -N 2 scroll-down
bind -T copy-mode   S-U    send-keys -X halfpage-up
bind -T copy-mode   S-D    send-keys -X halfpage-down
bind -T copy-mode   q      send-keys -X cancel
bind -T copy-mode   Escape send-keys -X cancel

# copy-mode-vi — vi 標準キーを維持
bind -T copy-mode-vi U    send-keys -X -N 2 scroll-up
bind -T copy-mode-vi D    send-keys -X -N 2 scroll-down
bind -T copy-mode-vi C-u  send-keys -X halfpage-up
bind -T copy-mode-vi C-d  send-keys -X halfpage-down
bind -T copy-mode-vi S-U  send-keys -X halfpage-up
bind -T copy-mode-vi S-D  send-keys -X halfpage-down

# ── スクロールバック ─────────────────────────────────────────
set -g history-limit 50000

# ── ペインボーダー ──────────────────────────────────────────
set -g pane-border-style        fg=colour236
set -g pane-active-border-style fg=red
set -g pane-border-lines        heavy
set -g pane-border-indicators   arrows
set -g allow-rename             off
set -g pane-border-format       ' #{?@name,#{@name},#{b:pane_current_path}} '
set -g pane-border-status       top

# ── ステータスバー ──────────────────────────────────────────
set -g status                       on
set -g status-style                 bg=default,fg=colour245
set -g window-status-format         ' #I:#W '
set -g window-status-current-format ' #I:#W '
set -g window-status-current-style  fg=red,bold
set -g status-left                  ''
set -g status-right                 ' #{session_name} '

# ── ハートビート自動起動（クロスマシンモード時）─────────────
# nmux.conf が存在し NMUX_MODE=crossmachine の場合のみ起動
set-hook -g session-created \
  'run-shell "if [ -f \"$HOME/.nmux/nmux.conf\" ] && grep -q \"crossmachine\" \"$HOME/.nmux/nmux.conf\" 2>/dev/null; then $HOME/.nmux/bin/nmux-heartbeat start 2>/dev/null || true; fi"'

# ── 一般設定 ─────────────────────────────────────────────────
set -g escape-time  10
set -g focus-events on
set -g default-terminal 'screen-256color'
